<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Elyra — Contestant</title>
  <link rel="stylesheet" href="./assets/competitions.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="topbar">
    <div class="container row">
      <div class="brand">ELYRA</div>
      <div class="navlinks">
        <a href="/competitions/">Competitions</a>
        <a href="/">Home</a>
      </div>
    </div>
  </div>

  <div class="container hero">
    <h1 class="h1" id="name">Loading…</h1>
    <p class="p" id="bio"></p>

    <div class="card" id="photoCard" style="display:none; padding:12px; margin-top:14px;">
      <img
        id="photoImg"
        alt="Contestant photo"
        style="width:100%; border-radius:14px; border:1px solid rgba(255,255,255,.10);"
        loading="lazy"
      />
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card span12">

        <div class="kpi">
          <div class="box">Vote: $1 each</div>
          <div class="box" id="totalVotes">Total votes: —</div>
        </div>

        <div class="hr"></div>

        <div class="btnrow">
          <button class="btn primary btn3d" id="voteBtn" disabled>Vote ($1)</button>
          <a class="btn" id="backBtn" href="/competitions/">Back</a>
        </div>

        <div class="hr"></div>

        <div class="payBox">
          <div class="label">Choose your vote amount</div>
          <div class="small">Each vote is paid. You’ll return to Elyra after checkout.</div>

          <div style="height:10px"></div>

          <div class="btnrow">
            <button class="btn btn3d glow10" id="pay10">Buy Votes ($10)</button>
            <button class="btn btn3d glow50" id="pay50">Buy Votes ($50)</button>
          </div>

          <p class="small" id="voteBreakdown" style="margin-top:10px;"></p>
        </div>

        <div class="hr"></div>
        <p class="small" id="msg"></p>

      </div>
    </div>
  </div>

  <script type="module">
    import * as dataApi from "./assets/data.js?v=15";
    import { startPaidVoteCheckout } from "./assets/vote.js?v=15";
    import { getParam, setText, toast } from "./assets/ui.js?v=15";

    const id = getParam("id");
    const slug = getParam("slug");

    const returnTo = location.origin + location.pathname + location.search;

    const name = document.getElementById("name");
    const bio = document.getElementById("bio");
    const msg = document.getElementById("msg");
    const voteBtn = document.getElementById("voteBtn");
    const totalVotes = document.getElementById("totalVotes");
    const voteBreakdown = document.getElementById("voteBreakdown");
    const backBtn = document.getElementById("backBtn");

    const pay10 = document.getElementById("pay10");
    const pay50 = document.getElementById("pay50");

    const photoCard = document.getElementById("photoCard");
    const photoImg = document.getElementById("photoImg");

    if (slug) {
      backBtn.href = `/competitions/contest.html?slug=${encodeURIComponent(slug)}`;
    }

    function safeImg(url) {
      if (!url) return null;
      const u = String(url).trim();
      if (u.startsWith("http://") || u.startsWith("https://")) return u;
      return null;
    }

    async function refreshTotals(contestantId) {
      try {
        const t = await dataApi.fetchVoteTotalsForContestant(contestantId);
        setText(totalVotes, `Total votes: ${Number(t?.total_votes || 0).toLocaleString()}`);
        setText(voteBreakdown, `Paid votes: ${Number(t?.paid_votes || 0).toLocaleString()}`);
      } catch (e) {
        console.error(e);
        setText(totalVotes, "Total votes: —");
        setText(voteBreakdown, "");
      }
    }

    let contestId = null;
    let contestantId = null;

    if (getParam("paid") === "1") {
      setText(msg, "Payment received. Thank you for supporting Elyra.");
    }

    try {
      if (!id) throw new Error("Missing contestant id.");

      const contestant = await dataApi.fetchContestantById(id);
      if (!contestant) throw new Error("Contestant not found.");

      contestantId = contestant.id;

      setText(name, contestant.display_name || "Contestant");
      setText(bio, contestant.bio || "");

      const img = safeImg(contestant.photo_url);
      if (img) {
        photoImg.src = img;
        photoCard.style.display = "block";
      }

      if (slug) {
        const contest = await dataApi.fetchContestBySlug(slug);
        contestId = contest?.id || contestant.contest_id;
      } else {
        contestId = contestant.contest_id;
      }

      if (!contestId) throw new Error("Contest missing.");

      voteBtn.disabled = false;

      await refreshTotals(contestantId);

      voteBtn.onclick = async () => {
        try {
          voteBtn.disabled = true;
          setText(msg, "Redirecting...");
          await startPaidVoteCheckout({ contestId, contestantId, pack: 1, returnTo });
        } catch (e) {
          toast(e.message);
          voteBtn.disabled = false;
        }
      };

      pay10.onclick = async () => {
        try {
          setText(msg, "Redirecting...");
          await startPaidVoteCheckout({ contestId, contestantId, pack: 10, returnTo });
        } catch (e) {
          toast(e.message);
        }
      };

      pay50.onclick = async () => {
        try {
          setText(msg, "Redirecting...");
          await startPaidVoteCheckout({ contestId, contestantId, pack: 50, returnTo });
        } catch (e) {
          toast(e.message);
        }
      };

    } catch (err) {
      console.error(err);
      setText(name, "Contestant unavailable");
      setText(bio, err.message);
      setText(msg, err.message);
    }
  </script>

</body>
</html>
