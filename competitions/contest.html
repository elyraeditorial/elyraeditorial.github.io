<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Elyra — Contest</title>
  <link rel="stylesheet" href="./assets/competitions.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    .cover-star-banner{
      position: relative;
      margin: 18px 0 22px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      background: #0d0d0f;
      box-shadow: 0 20px 60px rgba(0,0,0,.28);
    }

    .cover-star-banner::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,.14) 45%, rgba(0,0,0,.08)),
        linear-gradient(to right, rgba(0,0,0,.18), rgba(0,0,0,0) 35%, rgba(0,0,0,.1));
      pointer-events:none;
    }

    .cover-star-banner img{
      display:block;
      width:100%;
      height:min(58vw, 520px);
      object-fit:cover;
      object-position:center;
      filter:saturate(1.02) contrast(1.02);
    }

    .cover-star-copy{
      position:absolute;
      left:22px;
      bottom:20px;
      z-index:2;
      max-width:70%;
    }

    .cover-star-kicker{
      display:inline-block;
      margin-bottom:8px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.88);
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .cover-star-title{
      margin:0;
      color:#fff;
      font-family:'Playfair Display', serif;
      font-size:clamp(28px, 4vw, 54px);
      line-height:1.02;
      letter-spacing:.02em;
    }

    .cover-star-sub{
      margin:10px 0 0;
      color:rgba(255,255,255,.84);
      font-size:14px;
      line-height:1.5;
      max-width:560px;
    }

    @media (max-width: 720px){
      .cover-star-copy{ max-width:84%; left:16px; bottom:16px; }
      .cover-star-banner img{ height:420px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="container row">
      <div class="brand">ELYRA</div>
      <div class="navlinks">
        <a href="/competitions/">Competitions</a>
        <a href="/competitions/organizer/">Organizer</a>

        <a id="navLoginLink" href="/competitions/login.html">Login</a>
        <a id="navSignOutLink" href="#" style="display:none;">Sign out</a>

        <a href="/">Home</a>
        <span id="navWho" class="navwho"></span>
      </div>
    </div>
  </div>

  <div class="container hero">
    <h1 class="h1" id="title">Loading…</h1>
    <p class="p" id="subtitle"></p>
  </div>

  <div class="container">
    <div class="cover-star-banner">
      <img
        src="./assets/images/BFC3FF11-2A93-4391-8F55-7BEF3646789C.png"
        alt="Elyra next cover star feature image"
      />
      <div class="cover-star-copy">
        <div class="cover-star-kicker">Elyra Editorial</div>
        <h2 class="cover-star-title">Next Cover Star</h2>
        <p class="cover-star-sub">
          Vote, support, and follow the featured talent competing for the next Elyra cover moment.
        </p>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="badge" id="badge">Loading contestants…</div>
      <div class="hr"></div>
      <div class="list" id="list"></div>
      <div class="hr"></div>
      <p class="small" id="msg"></p>
    </div>
  </div>

  <script type="module">
    import * as dataApi from "./assets/data.js";
    import { getParam, setText, setHTML } from "./assets/ui.js";
    import { wireNavAuth } from "./assets/navAuth.js";

    wireNavAuth();

    const slug = getParam("slug");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const badge = document.getElementById("badge");
    const list = document.getElementById("list");
    const msg = document.getElementById("msg");

    function money(n){ return Number(n||0).toLocaleString(); }

    try{
      if(!slug) throw new Error("Missing contest slug.");

      const contest = await dataApi.fetchContestBySlug(slug);
      if(!contest) throw new Error("Contest not found.");

      setText(title, contest.title || "Contest");
      setText(subtitle, contest.subtitle || "");

      if(typeof dataApi.fetchContestantsByContestId !== "function"){
        throw new Error("data.js missing fetchContestantsByContestId().");
      }

      const contestants = await dataApi.fetchContestantsByContestId(contest.id);

      setText(badge, contestants.length ? `${contestants.length} Contestant(s)` : "No contestants yet");

      let totalsMap = {};
      if(typeof dataApi.fetchVoteTotalsForContest === "function"){
        const totalsRows = await dataApi.fetchVoteTotalsForContest(contest.id);
        for(const r of (totalsRows || [])){
          totalsMap[r.contestant_id] = r;
        }
      }

      setHTML(list, contestants.map(c => {
        const t = totalsMap[c.id] || {};
        const totalVotes = t.total_votes ?? t.total ?? null;

        return `
          <div class="item">
            <div>
              <h3>${c.display_name || "Contestant"}</h3>
              <p>${c.bio || ""}</p>
              ${totalVotes !== null ? `<p class="small">Votes: ${money(totalVotes)}</p>` : ``}
            </div>
            <div class="btnrow">
              <a class="btn primary"
                 href="/competitions/contestant.html?id=${encodeURIComponent(c.id)}&slug=${encodeURIComponent(slug)}">
                View
              </a>
            </div>
          </div>
        `;
      }).join(""));

      setText(msg, "");
    }catch(err){
      console.error(err);
      setText(title, "Error");
      setText(subtitle, "");
      setText(badge, "Failed to load");
      setHTML(list, `<p class="small">${err?.message || "Unknown error"}</p>`);
      setText(msg, "If this error mentions RLS or permission denied, fix policies for contests/contestants.");
    }
  </script>
</body>
</html>
