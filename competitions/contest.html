<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Elyra — Contest</title>
  <link rel="stylesheet" href="./assets/competitions.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    .hero-wrap{
      padding-top: 18px;
    }

    .editorial-hero{
      position: relative;
      width: 100%;
      min-height: 760px;
      border-radius: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(214,172,84,.18), transparent 26%),
        linear-gradient(180deg, #17120f 0%, #090909 100%);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        0 36px 120px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.05);
      isolation: isolate;
    }

    .editorial-hero img{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 18%;
      transform: scale(1.02);
    }

    .editorial-hero::before{
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,235,195,.10), transparent 22%),
        linear-gradient(to bottom, rgba(0,0,0,.06), rgba(0,0,0,.14) 24%, rgba(0,0,0,.44) 66%, rgba(0,0,0,.78) 100%),
        linear-gradient(to right, rgba(0,0,0,.42) 0%, rgba(0,0,0,.08) 28%, rgba(0,0,0,.08) 72%, rgba(0,0,0,.36) 100%);
      pointer-events: none;
    }

    .editorial-hero::after{
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      box-shadow:
        inset 0 -120px 120px rgba(0,0,0,.28),
        inset 0 0 90px rgba(0,0,0,.12);
    }

    .editorial-frame{
      position: absolute;
      inset: 18px;
      z-index: 2;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      pointer-events: none;
    }

    .editorial-copy{
      position: absolute;
      left: clamp(28px, 4vw, 48px);
      right: clamp(28px, 4vw, 48px);
      bottom: clamp(28px, 4vw, 46px);
      z-index: 3;
      max-width: 760px;
    }

    .editorial-kicker{
      display: inline-block;
      margin-bottom: 16px;
      padding: 10px 15px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.94);
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .editorial-title{
      margin: 0;
      color: #fff;
      font-family: "Playfair Display", serif;
      font-weight: 700;
      font-size: clamp(56px, 7.2vw, 110px);
      line-height: .9;
      letter-spacing: -.045em;
      text-wrap: balance;
      text-shadow: 0 10px 30px rgba(0,0,0,.34);
    }

    .editorial-sub{
      margin: 18px 0 0;
      max-width: 620px;
      color: rgba(255,255,255,.90);
      font-size: clamp(16px, 1.8vw, 21px);
      line-height: 1.55;
      text-shadow: 0 4px 18px rgba(0,0,0,.28);
    }

    .title-block{
      margin-top: 24px;
      margin-bottom: 8px;
    }

    .title-block .h1{
      margin-bottom: 10px;
    }

    @media (max-width: 1100px){
      .editorial-hero{
        min-height: 680px;
      }

      .editorial-title{
        font-size: clamp(48px, 8vw, 90px);
      }
    }

    @media (max-width: 900px){
      .editorial-hero{
        min-height: 620px;
      }

      .editorial-copy{
        max-width: 92%;
      }

      .editorial-title{
        font-size: clamp(42px, 9vw, 70px);
        line-height: .95;
      }

      .editorial-sub{
        font-size: 16px;
        max-width: 92%;
      }
    }

    @media (max-width: 640px){
      .hero-wrap{
        padding-top: 10px;
      }

      .editorial-hero{
        width: 100%;
        min-height: 540px;
        border-radius: 22px;
        background:
          radial-gradient(circle at 50% 12%, rgba(214,172,84,.12), transparent 24%),
          linear-gradient(180deg, #17120f 0%, #090909 100%);
      }

      .editorial-hero img{
        object-fit: contain;
        object-position: center top;
        transform: none;
        top: 12px;
        height: calc(100% - 12px);
      }

      .editorial-hero::before{
        background:
          linear-gradient(to bottom,
            rgba(0,0,0,.03),
            rgba(0,0,0,.08) 24%,
            rgba(0,0,0,.30) 62%,
            rgba(0,0,0,.74) 100%);
      }

      /* tighter frame to fit the visible photo area */
      .editorial-frame{
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-radius: 16px;
      }

      .editorial-copy{
        left: 16px;
        right: 16px;
        bottom: 16px;
        max-width: none;
      }

      .editorial-kicker{
        margin-bottom: 8px;
        padding: 6px 10px;
        font-size: 10px;
        letter-spacing: .14em;
      }

      .editorial-title{
        font-size: clamp(26px, 9vw, 40px);
        line-height: .95;
        letter-spacing: -.02em;
      }

      .editorial-sub{
        margin-top: 8px;
        font-size: 13.5px;
        line-height: 1.4;
        max-width: 100%;
      }

      .title-block{
        margin-top: 16px;
      }

      .title-block .h1,
      .title-block .p{
        padding-left: 8px;
        padding-right: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="container row">
      <div class="brand">ELYRA</div>
      <div class="navlinks">
        <a href="/competitions/">Competitions</a>
        <a href="/competitions/organizer/">Organizer</a>
        <a id="navLoginLink" href="/competitions/login.html">Login</a>
        <a id="navSignOutLink" href="#" style="display:none;">Sign out</a>
        <a href="/">Home</a>
        <span id="navWho" class="navwho"></span>
      </div>
    </div>
  </div>

  <div class="container hero-wrap">
    <section class="editorial-hero" aria-label="Elyra cover star feature">
      <img
        src="/BFC3FF11-2A93-4391-8F55-7BEF3646789C.png"
        alt="Elyra Cover Star 2026"
      />
      <div class="editorial-frame"></div>
      <div class="editorial-copy">
        <div class="editorial-kicker">Elyra Editorial</div>
        <h2 class="editorial-title">Next<br>Cover Star</h2>
        <p class="editorial-sub">
          A luxury editorial competition where presence, beauty, and star power earn the next Elyra cover moment.
        </p>
      </div>
    </section>
  </div>

  <div class="container hero title-block">
    <h1 class="h1" id="title">Loading…</h1>
    <p class="p" id="subtitle"></p>
  </div>

  <div class="container">
    <div class="card">
      <div class="badge" id="badge">Loading contestants…</div>
      <div class="hr"></div>
      <div class="list" id="list"></div>
      <div class="hr"></div>
      <p class="small" id="msg"></p>
    </div>
  </div>

  <script type="module">
    import * as dataApi from "./assets/data.js";
    import { getParam, setText, setHTML } from "./assets/ui.js";
    import { wireNavAuth } from "./assets/navAuth.js";

    wireNavAuth();

    const slug = getParam("slug");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const badge = document.getElementById("badge");
    const list = document.getElementById("list");
    const msg = document.getElementById("msg");

    function money(n){ return Number(n||0).toLocaleString(); }

    try{
      if(!slug) throw new Error("Missing contest slug.");

      const contest = await dataApi.fetchContestBySlug(slug);
      if(!contest) throw new Error("Contest not found.");

      setText(title, contest.title || "Contest");
      setText(subtitle, contest.subtitle || "");

      if(typeof dataApi.fetchContestantsByContestId !== "function"){
        throw new Error("data.js missing fetchContestantsByContestId().");
      }

      const contestants = await dataApi.fetchContestantsByContestId(contest.id);

      setText(badge, contestants.length ? `${contestants.length} Contestant(s)` : "No contestants yet");

      let totalsMap = {};
      if(typeof dataApi.fetchVoteTotalsForContest === "function"){
        const totalsRows = await dataApi.fetchVoteTotalsForContest(contest.id);
        for(const r of (totalsRows || [])){
          totalsMap[r.contestant_id] = r;
        }
      }

      setHTML(list, contestants.map(c => {
        const t = totalsMap[c.id] || {};
        const totalVotes = t.total_votes ?? t.total ?? null;

        return `
          <div class="item">
            <div>
              <h3>${c.display_name || "Contestant"}</h3>
              <p>${c.bio || ""}</p>
              ${totalVotes !== null ? `<p class="small">Votes: ${money(totalVotes)}</p>` : ``}
            </div>
            <div class="btnrow">
              <a class="btn primary"
                 href="/competitions/contestant.html?id=${encodeURIComponent(c.id)}&slug=${encodeURIComponent(slug)}">
                View
              </a>
            </div>
          </div>
        `;
      }).join(""));

      setText(msg, "");
    }catch(err){
      console.error(err);
      setText(title, "Error");
      setText(subtitle, "");
      setText(badge, "Failed to load");
      setHTML(list, `<p class="small">${err?.message || "Unknown error"}</p>`);
      setText(msg, "If this error mentions RLS or permission denied, fix policies for contests/contestants.");
    }
  </script>
</body>
</html>
