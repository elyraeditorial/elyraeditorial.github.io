<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ELYRA — Signed In</title>
  <link rel="stylesheet" href="./assets/competitions.css"/>
</head>
<body>
  <div class="topbar">
    <div class="container row">
      <div class="brand">ELYRA</div>
      <div class="navlinks">
        <a href="/competitions/">Competitions</a>
        <a href="/competitions/organizer/">Organizer</a>

        <!-- controlled by navAuth -->
        <a id="navLoginLink" href="/competitions/login.html" style="display:none;">Login</a>
        <a id="navSignOutLink" href="#" style="display:none;">Sign out</a>

        <a href="/">Home</a>
        <span id="navWho" class="navwho"></span>
      </div>
    </div>
  </div>

  <div class="container hero">
    <h1 class="h1">Signed in ✅</h1>
    <p class="p" id="who">Finalizing session…</p>

    <div class="btnrow" style="margin-top:14px;">
      <a class="btn primary" id="continueBtn" href="/competitions/">Continue</a>
      <a class="btn" href="/competitions/">View contests</a>
      <a class="btn" href="/competitions/organizer/">Organizer dashboard</a>
    </div>

    <p class="small" style="margin-top:10px;opacity:.85">
      If you don’t get redirected, tap Continue.
    </p>
  </div>

  <script type="module">
    import { supabase } from "./assets/supabaseClient.js";
    import { wireNavAuth } from "./assets/navAuth.js";

    function getParam(name){
      const u = new URL(location.href);
      return u.searchParams.get(name);
    }

    function safeNext(u){
      if(!u) return "/competitions/";
      try{
        const d = decodeURIComponent(u);
        return d.startsWith("/") ? d : "/competitions/";
      }catch{
        return "/competitions/";
      }
    }

    wireNavAuth();

    const who = document.getElementById("who");
    const continueBtn = document.getElementById("continueBtn");

    const next = safeNext(getParam("next"));
    continueBtn.href = next;

    // 🔥 KEY FIX: wait for Supabase to fully restore session
    async function waitForUser(maxTries = 12, delay = 300){
      for(let i = 0; i < maxTries; i++){
        const { data: { user }, error } = await supabase.auth.getUser();
        if(error) console.warn(error);

        if(user) return user;

        await new Promise(r => setTimeout(r, delay));
      }
      return null;
    }

    try{
      who.textContent = "Finalizing session…";

      const user = await waitForUser();

      if(user?.email){
        who.textContent = `Signed in as: ${user.email}`;

        // smooth redirect
        setTimeout(() => location.replace(next), 900);
      }else{
        throw new Error("No active user session yet.");
      }
    }catch(err){
      console.error(err);
      who.textContent = "No active session. Please log in again.";

      setTimeout(() => {
        location.replace(`/competitions/login.html?next=${encodeURIComponent(next)}`);
      }, 1200);
    }

    // 🔥 EXTRA: react to auth changes instantly
    supabase.auth.onAuthStateChange((_event, session) => {
      if(session?.user){
        console.log("Auth updated:", session.user.email);
      }
    });
  </script>
</body>
</html>
